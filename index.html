<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <title>Robot Configurator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell">
      <!-- ═══════ LEFT PANEL ═══════ -->
      <aside class="panel panel-left">
        <div class="logo-header">
          <h1 class="logo">Robot Configurator</h1>
          <div class="logo-sub">
            UNIT&nbsp;MK-1 &nbsp;·&nbsp; BUILD MODE ACTIVE
          </div>
        </div>

        <!-- COMPONENTS — collapsible -->
        <section class="panel-section">
          <button class="section-toggle" data-target="sec-components">
            COMPONENTS
            <span class="chevron">▼</span>
          </button>
          <div class="section-body" id="sec-components">
            <div class="btn-tip-wrap" data-tip="addFrame">
              <button id="addFrame" class="btn btn-frame">
                <div class="btn-inner">
                  <span class="btn-glyph">▬</span>
                  <span class="btn-body">
                    <span class="btn-label">Rect. Frame</span>
                    <span class="btn-desc">Structural base</span>
                  </span>
                  <span class="btn-tag">FRM</span>
                </div>
              </button>
            </div>

            <div class="btn-tip-wrap" data-tip="addMotor">
              <button id="addMotor" class="btn btn-motor">
                <div class="btn-inner">
                  <span class="btn-glyph">⬡</span>
                  <span class="btn-body">
                    <span class="btn-label">Add Motor</span>
                    <span class="btn-desc">Drive unit housing</span>
                  </span>
                  <span class="btn-tag">MOT</span>
                </div>
              </button>
            </div>

            <div class="btn-tip-wrap" data-tip="addWheelBtn">
              <button
                id="addWheelBtn"
                class="btn btn-wheel"
                disabled
                style="opacity: 0.35; pointer-events: none"
                title="Place a Motor first to unlock wheels"
              >
                <div class="btn-inner">
                  <span class="btn-glyph">◉</span>
                  <span class="btn-body">
                    <span class="btn-label">Add Wheel</span>
                    <span class="btn-desc">Motor-driven wheel</span>
                  </span>
                  <span class="btn-tag">WHL</span>
                </div>
              </button>
            </div>

            <div class="btn-tip-wrap" data-tip="addTriangle">
              <button id="addTriangle" class="btn btn-triangle">
                <div class="btn-inner">
                  <span class="btn-glyph">▲</span>
                  <span class="btn-body">
                    <span class="btn-label">Tri. Frame</span>
                    <span class="btn-desc">Angular brace</span>
                  </span>
                  <span class="btn-tag">TRI</span>
                </div>
              </button>
            </div>

            <div class="btn-tip-wrap" data-tip="addSupportFrame">
              <button id="addSupportFrame" class="btn btn-support">
                <div class="btn-inner">
                  <span class="btn-glyph">╬</span>
                  <span class="btn-body">
                    <span class="btn-label">Stress Bridge</span>
                    <span class="btn-desc">Cross-bridge span</span>
                  </span>
                  <span class="btn-tag">SUP</span>
                </div>
              </button>
            </div>
          </div>
        </section>

        <!-- CAMERA PRESETS -->
        <section class="panel-section panel-section-camera">
          <button class="section-toggle" data-target="sec-camera">
            CAMERA PRESETS
            <span class="chevron">▼</span>
          </button>
          <div class="section-body" id="sec-camera">
            <div class="sidebar-cam-grid">
              <button
                class="sidebar-cam-btn active"
                data-cam="front"
                title="Front View"
              >
                <span class="sidebar-cam-icon">⬛</span>
                <span class="sidebar-cam-label">FRONT</span>
              </button>
              <button class="sidebar-cam-btn" data-cam="back" title="Back View">
                <span class="sidebar-cam-icon">⬛</span>
                <span class="sidebar-cam-label">BACK</span>
              </button>
              <button class="sidebar-cam-btn" data-cam="top" title="Top View">
                <span class="sidebar-cam-icon">⊡</span>
                <span class="sidebar-cam-label">TOP</span>
              </button>
              <button
                class="sidebar-cam-btn"
                data-cam="left"
                title="Left Side View"
              >
                <span class="sidebar-cam-icon">◁</span>
                <span class="sidebar-cam-label">LEFT</span>
              </button>
              <button
                class="sidebar-cam-btn"
                data-cam="right"
                title="Right Side View"
              >
                <span class="sidebar-cam-icon">▷</span>
                <span class="sidebar-cam-label">RIGHT</span>
              </button>
              <button
                class="sidebar-cam-btn"
                data-cam="iso"
                title="Isometric View"
              >
                <span class="sidebar-cam-icon">⬡</span>
                <span class="sidebar-cam-label">ISO</span>
              </button>
            </div>
            <div class="cam-hint">Alt+0–7 or click to switch</div>
          </div>
        </section>

        <!-- UNDO / REDO -->
        <section class="panel-section undo-redo-section">
          <div class="undo-redo-row">
            <button
              id="undoBtn"
              class="undo-redo-btn"
              disabled
              style="opacity: 0.35; pointer-events: none"
              title="Undo (Ctrl+Z)"
            >
              <span class="ur-icon">↩</span>
              <span class="ur-label">UNDO</span>
              <span class="ur-kbd">Ctrl Z</span>
            </button>
            <button
              id="redoBtn"
              class="undo-redo-btn"
              disabled
              style="opacity: 0.35; pointer-events: none"
              title="Redo (Ctrl+Y)"
            >
              <span class="ur-icon">↪</span>
              <span class="ur-label">REDO</span>
              <span class="ur-kbd">Ctrl Y</span>
            </button>
          </div>
        </section>
      </aside>

      <!-- ═══════ VIEWPORT ═══════ -->
      <main class="viewport">
        <canvas id="app"></canvas>
        <div id="idle-arrows"></div>

        <div id="viewport-rot-controls" style="display: none">
          <div class="arrow-key-row arrow-key-row-top">
            <div
              class="arrow-key arrow-key-inactive arrow-key-center"
              id="arrowKeyUp"
            >
              <span class="arrow-key-glyph">↑</span>
            </div>
          </div>
          <div class="arrow-key-row arrow-key-row-bottom">
            <button
              class="arrow-key arrow-key-active arrow-key-labeled"
              id="arrowKeyLeft"
              title="Rotate left (← Arrow)"
            >
              <span class="arrow-key-label">Rotate L</span>
              <span class="arrow-key-glyph">←</span>
            </button>
            <div
              class="arrow-key arrow-key-inactive arrow-key-center"
              id="arrowKeyDown"
            >
              <span class="arrow-key-glyph">↓</span>
            </div>
            <button
              class="arrow-key arrow-key-active arrow-key-labeled"
              id="arrowKeyRight"
              title="Rotate right (→ Arrow)"
            >
              <span class="arrow-key-glyph">→</span>
              <span class="arrow-key-label">Rotate R</span>
            </button>
          </div>
        </div>
      </main>

      <!-- ═══════ RIGHT PANEL ═══════ -->
      <aside class="panel panel-right">
        <div class="basket-header">
          <span class="basket-title">Requisition</span>
          <span class="basket-count" id="basketCount">0 ITEMS</span>
        </div>

        <div class="basket-section">
          <div id="basketItems" class="basket-items"></div>
        </div>

        <div class="basket-footer">
          <div style="display: flex; flex-direction: column; gap: 2px">
            <span>Total Cost</span>
            <span
              style="
                font-family: &quot;Share Tech Mono&quot;, monospace;
                font-size: 8px;
                color: #6a8098;
                letter-spacing: 0.1em;
                text-transform: uppercase;
              "
              >Incl. GST</span
            >
          </div>
          <span class="price">&#8377;<span id="totalPrice">0</span></span>
        </div>

        <div id="paymentSection" class="payment-section hidden">
          <button id="proceedPaymentBtn" class="btn btn-primary">
            <div class="btn-inner">
              <span class="btn-icon">▶▶</span>
              <span class="btn-action-label">Proceed to Payment</span>
            </div>
          </button>
        </div>

        <!-- FINALIZE + PRINT -->
        <div class="save-print-section">
          <button id="finalizeBtn" class="btn btn-primary btn-finalize-large">
            <div class="btn-inner">
              <span class="btn-icon">◼</span>
              <span class="btn-action-label">Finalize Design</span>
            </div>
          </button>
          <button id="printDesignBtn" class="btn btn-print">
            <div class="btn-inner">
              <span class="btn-icon">▤</span>
              <span class="btn-action-label">Print Report</span>
            </div>
          </button>
        </div>
      </aside>
    </div>

    <script>
      // ── Collapsible sections ──────────────────────────────────────
      document.querySelectorAll(".section-toggle").forEach((toggle) => {
        const targetId = toggle.dataset.target;
        const body = document.getElementById(targetId);
        toggle.addEventListener("click", () => {
          const isCollapsed = toggle.classList.contains("collapsed");
          if (isCollapsed) {
            toggle.classList.remove("collapsed");
            body.classList.remove("collapsed");
            body.classList.add("animate-in");
            setTimeout(() => body.classList.remove("animate-in"), 400);
          } else {
            toggle.classList.add("collapsed");
            body.classList.add("collapsed");
          }
        });
      });

      // ── Basket item counter ───────────────────────────────────────
      const basketEl = document.getElementById("basketItems");
      const countEl = document.getElementById("basketCount");
      if (basketEl && countEl) {
        new MutationObserver(() => {
          const n = basketEl.children.length;
          countEl.textContent = n + (n === 1 ? " ITEM" : " ITEMS");
        }).observe(basketEl, { childList: true });
      }

      // ── COMPONENT BUTTON TOOLTIPS ─────────────────────────────────
      (function () {
        const TIPS = {
          addFrame: {
            title: "RECTANGULAR FRAME",
            desc: "Primary structural base. Extends chassis via edge sockets. Place freely or snap to existing frame joints.",
            cost: "₹1,200",
            req: "",
          },
          addMotor: {
            title: "MOTOR HOUSING",
            desc: "Drive unit for wheels. Mounts on motor sockets around the frame perimeter. Each motor exposes one wheel shaft.",
            cost: "₹2,500",
            req: "Needs: free motor socket on a frame",
          },
          addWheelBtn: {
            title: "WHEEL",
            desc: "Motorised wheel assembly. Snaps directly onto motor output shafts. Stays locked until a motor is placed.",
            cost: "₹1,100",
            req: "Needs: 1× Motor placed first",
          },
          addTriangle: {
            title: "TRIANGULAR FRAME",
            desc: "Corner brace with stress-connector sockets. Two tri. frames are required before a Support Bridge can be placed.",
            cost: "₹650",
            req: "",
          },
          addSupportFrame: {
            title: "STRESS BRIDGE",
            desc: "Cross-span connector that locks two triangular frames together. Bridges must run along a straight X or Z axis.",
            cost: "₹900",
            req: "Needs: 2× Triangular Frames",
          },
        };

        const tip = document.createElement("div");
        tip.className = "comp-tooltip";
        tip.innerHTML = `
          <div class="comp-tooltip-title"></div>
          <div class="comp-tooltip-desc"></div>
          <div class="comp-tooltip-row">
            <div class="comp-tooltip-cost"></div>
            <div class="comp-tooltip-req"></div>
          </div>`;
        document.body.appendChild(tip);

        const titleEl = tip.querySelector(".comp-tooltip-title");
        const descEl = tip.querySelector(".comp-tooltip-desc");
        const costEl = tip.querySelector(".comp-tooltip-cost");
        const reqEl = tip.querySelector(".comp-tooltip-req");

        let hideTimer = null;

        document.querySelectorAll(".btn-tip-wrap").forEach(function (wrap) {
          const id = wrap.dataset.tip;
          const data = TIPS[id];
          if (!data) return;

          wrap.addEventListener("mouseenter", function () {
            clearTimeout(hideTimer);
            titleEl.textContent = data.title;
            descEl.textContent = data.desc;
            costEl.textContent = data.cost;
            reqEl.textContent = data.req;

            const rect = wrap.getBoundingClientRect();
            tip.style.left = rect.right + 12 + "px";
            tip.style.top =
              Math.max(
                8,
                Math.min(
                  rect.top + rect.height / 2 - 55,
                  window.innerHeight - 160,
                ),
              ) + "px";
            tip.classList.add("visible");
          });

          wrap.addEventListener("mouseleave", function () {
            hideTimer = setTimeout(function () {
              tip.classList.remove("visible");
            }, 80);
          });
        });
      })();
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
